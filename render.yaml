# TimeSense — Render Blueprint (starting template). Full walkthrough in docs/DEPLOY.md.
#
# Stands up the backend (API + Celery worker + beat), managed Postgres + Redis, and (optionally) the
# Next.js web companion. Secrets are marked `sync: false` — set their values in the Render dashboard,
# never in git.
#
# DATABASE_URL + DATABASE_URL_SYNC are wired automatically from the managed Postgres below (the app
# coerces DATABASE_URL to the +asyncpg driver), so no database URL needs hand-entering.

databases:
  - name: timesense-db
    databaseName: timesense
    plan: basic-256mb
    postgresMajorVersion: "16"

envVarGroups:
  # Set every one of these in the dashboard (Environment → this group). See the PRODUCTION block in
  # .env.example for what each is.
  - name: timesense-secrets
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: APNS_USE_SANDBOX
        value: "false"
      # OAuth (prod HTTPS callbacks + client creds) — set the ones you use:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GMAIL_REDIRECT_URI
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_REDIRECT_URI
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_REDIRECT_URI
        sync: false
      - key: NOTION_CLIENT_ID
        sync: false
      - key: NOTION_CLIENT_SECRET
        sync: false
      - key: NOTION_REDIRECT_URI
        sync: false
      - key: OAUTH_WEB_SUCCESS_REDIRECT
        sync: false
      - key: OAUTH_WEB_FAILURE_REDIRECT
        sync: false

services:
  - type: keyvalue
    name: timesense-redis
    plan: free               # only used as the Celery queue; free tier is plenty at low volume
    ipAllowList: []          # reachable only by the services in this blueprint

  - type: web
    name: timesense-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/v1/health
    preDeployCommand: "alembic upgrade head"   # migrations run once before the new version goes live
    envVars:
      - key: APP_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: "2"
      # Both come from the managed Postgres. The app coerces DATABASE_URL to the +asyncpg driver.
      - key: DATABASE_URL
        fromDatabase:
          name: timesense-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: timesense-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: timesense-redis
          property: connectionString
      - fromGroup: timesense-secrets

  # One worker with beat embedded (--beat) to save a service. Keep this at a SINGLE instance — if you
  # ever scale the worker to >1, split beat into its own service so the schedule isn't run multiple times.
  - type: worker
    name: timesense-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    dockerCommand: celery -A app.workers.celery_app worker --beat --loglevel=info --concurrency=2
    envVars:
      - key: APP_ENV
        value: production
      # Both come from the managed Postgres. The app coerces DATABASE_URL to the +asyncpg driver.
      - key: DATABASE_URL
        fromDatabase:
          name: timesense-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: timesense-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: timesense-redis
          property: connectionString
      - fromGroup: timesense-secrets

# The web companion is NOT on Render (to save a service) — deploy web/ to Vercel (free, native Next.js).
# See docs/DEPLOY.md. Its Dockerfile (web/Dockerfile) still exists if you prefer to self-host it.
