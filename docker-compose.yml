services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: timesense
      POSTGRES_PASSWORD: timesense
      POSTGRES_DB: timesense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timesense"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # The web role applies migrations on start (worker/beat share the image but leave this unset).
      - RUN_MIGRATIONS=1
      - DATABASE_URL=postgresql+asyncpg://timesense:timesense@postgres:5432/timesense
      - DATABASE_URL_SYNC=postgresql://timesense:timesense@postgres:5432/timesense
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://timesense:timesense@postgres:5432/timesense
      - DATABASE_URL_SYNC=postgresql://timesense:timesense@postgres:5432/timesense
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Scheduler — fires the beat_schedule (morning/evening check-ins, weekly insights, and the
  # every-30-min proactive-push scan). One beat process; the worker(s) above execute the tasks.
  beat:
    build:
      context: ./backend
      target: production
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://timesense:timesense@postgres:5432/timesense
      - DATABASE_URL_SYNC=postgresql://timesense:timesense@postgres:5432/timesense
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
